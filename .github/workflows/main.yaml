name: main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate Environment Variables File for Production
        run: |
          echo "NOTION_SECRET_KEY=$NOTION_SECRET_KEY" >> .env.production
          echo "NOTION_BOOK_DATABASE_ID=$NOTION_BOOK_DATABASE_ID" >> .env.production
          echo "NEXT_PUBLIC_HASHTAG_API_URL=$NEXT_PUBLIC_HASHTAG_API_URL" >> .env.production
          echo "NEXT_PUBLIC_GAMES_API_URL=$NEXT_PUBLIC_GAMES_API_URL" >> .env.production
          echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" >> .env.production
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> .env.production
          echo "NEXT_PUBLIC_KYUNO_API_URL=$NEXT_PUBLIC_KYUNO_API_URL" >> .env.production
        env:
          NOTION_SECRET_KEY: ${{ secrets.NOTION_SECRET_KEY }}
          NOTION_BOOK_DATABASE_ID: ${{ secrets.NOTION_BOOK_DATABASE_ID }}
          NEXT_PUBLIC_HASHTAG_API_URL: ${{ secrets.NEXT_PUBLIC_HASHTAG_API_URL }}
          NEXT_PUBLIC_GAMES_API_URL: ${{ secrets.NEXT_PUBLIC_GAMES_API_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_KYUNO_API_URL: ${{ secrets.NEXT_PUBLIC_KYUNO_API_URL }}

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Remove existing files from S3 bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws s3 rm s3://kyu-niverse.com --recursive --region ap-northeast-2

      - name: Deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp \
          --recursive \
          --region ap-northeast-2 \
          out s3://kyu-niverse.com

      - name: Invalidate CloudFront cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws cloudfront create-invalidation \
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
          --paths "/*"

      - name: Notify success via webhook
        if: success()
        env:
          DEPLOY_SLACK_WEBHOOK_URL: ${{ secrets.DEPLOY_SLACK_WEBHOOK_URL }}
        run: bash ./webhook.sh $DEPLOY_SLACK_WEBHOOK_URL 성공

      - name: Notify failure via webhook
        if: failure()
        env:
          DEPLOY_SLACK_WEBHOOK_URL: ${{ secrets.DEPLOY_SLACK_WEBHOOK_URL }}
        run: bash ./webhook.sh $DEPLOY_SLACK_WEBHOOK_URL 실패
